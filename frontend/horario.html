<!--
  horario.html — Página de visualización y descarga del horario semanal

  Esta es la pantalla principal del producto. Su función es:
    - Mostrar la grilla visual semanal (Lunes a Sábado, bloques de tiempo)
    - Colorear cada bloque según la materia que le corresponde
    - Resaltar visualmente los bloques en conflicto
    - Ofrecer un botón para descargar el horario como PDF o imagen (PNG)

  Scripts que carga:
    - js/api.js    → para obtener materias y bloques del backend
    - js/grilla.js → para construir y renderizar la grilla en el DOM

  Esta página es de solo lectura. No tiene formularios de registro.
  Para agregar o eliminar materias, el usuario debe ir a index.html.
-->
